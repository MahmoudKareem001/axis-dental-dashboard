<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AXIS Dental Laboratory</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<aside class="sidebar">

<div class="logo">
<h1>AXIS</h1>
<p>Dental Laboratory</p>
</div>

<div class="menu">
<button onclick="showSection('home')">🏠 الرئيسية</button>
<button onclick="showSection('orders')">📋 الطلبات</button>
<button onclick="showSection('inventory')">📦 المخزون</button>
<button onclick="showSection('employees')">👥 الموظفون</button>
<button onclick="showSection('reports')">📊 التقارير</button>
</div>

</aside>

<main class="main">

<section id="home" class="section active">

<div class="cards">

<div class="card">
<h3>إجمالي الطلبات</h3>
<p id="todayOrders">0</p>
</div>

<div class="card">
<h3>قيد العمل</h3>
<p id="workingOrders">0</p>
</div>

<div class="card">
<h3>جاهزة للتسليم</h3>
<p id="readyOrders">0</p>
</div>

<div class="card">
<h3>مواد ناقصة</h3>
<p>0</p>
</div>

</div>

</section>

<section id="orders" class="section">

<h2>الطلبات</h2>

<button onclick="addOrder()">
➕ إضافة طلب جديد
</button>

<table>

<thead>
<tr>
<th>رقم الطلب</th>
<th>اسم الطبيب</th>
<th>اسم المريض</th>
<th>نوع العمل</th>
<th>الحالة</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</section>

<section id="inventory" class="section">
<h2>المخزون</h2>
</section>

<section id="employees" class="section">
<h2>الموظفون</h2>
</section>

<section id="reports" class="section">
<h2>التقارير</h2>
</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
