<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>AXIS Dental Laboratory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <h1>AXIS</h1>
    <p>Dental Laboratory</p>
  </div>

  <div class="menu">
    <button>🏠 الرئيسية</button>
    <button>📋 الطلبات</button>
    <button>📦 المخزون</button>
    <button>🦷 مراحل العمل</button>
    <button>📷 التصوير</button>
    <button>👨‍🔬 الفنيون</button>
    <button>👥 الموظفون</button>
    <button>💰 الحسابات</button>
    <button>🚚 الموردون</button>
    <button>📊 التقارير</button>
    <button>⚙️ الإعدادات</button>
  </div>
</aside>

<main class="main">
  <div class="cards">
    <div class="card"><h3>📋 الطلبات اليوم</h3><p id="todayOrders">0</p></div>
    <div class="card"><h3>⏳ قيد العمل</h3><p>0</p></div>
    <div class="card"><h3>✅ جاهزة للتسليم</h3><p>0</p></div>
    <div class="card"><h3>📦 مواد ناقصة</h3><p>0</p></div>
  </div>

  <h2>الطلبات</h2>
  <button onclick="addOrder()">➕ إضافة طلب جديد</button>

  <table>
    <thead>
      <tr>
        <th>رقم الطلب</th>
        <th>اسم الطبيب</th>
        <th>اسم المريض</th>
        <th>نوع العمل</th>
        <th>الحالة</th>
        <th>الإجراءات</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>
</main>

<script src="app.js"></script>
</body>
</html>
