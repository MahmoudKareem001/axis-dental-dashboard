<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>AXIS Dental Laboratory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>AXIS Dental Laboratory</h1>
  <p>لوحة إدارة مختبر الأسنان</p>
</header>

<nav>
  <button>الرئيسية</button>
  <button>الطلبات</button>
  <button>المخزون</button>
  <button>الموظفين</button>
  <button>التصوير</button>
  <button>الحسابات</button>
  <button>الموردين</button>
  <button>التقارير</button>
</nav>

<div class="container">
  <div class="cards">
    <div class="card"><h3>الطلبات اليوم</h3><p id="todayOrders">0</p></div>
    <div class="card"><h3>قيد العمل</h3><p>0</p></div>
    <div class="card"><h3>جاهزة للتسليم</h3><p>0</p></div>
    <div class="card"><h3>مواد ناقصة</h3><p>0</p></div>
  </div>

  <h2>الطلبات</h2>
  <button onclick="addOrder()">➕ إضافة طلب جديد</button>

  <table border="1" width="100%" style="margin-top:15px;background:white;">
    <thead>
      <tr>
        <th>رقم الطلب</th>
        <th>اسم الطبيب</th>
        <th>اسم المريض</th>
        <th>نوع العمل</th>
        <th>الحالة</th>
        <th>الإجراءات</th>
      </tr>
    </thead>
    <tbody id="ordersTable"></tbody>
  </table>
</div>

<script src="app.js"></script>
</body>
</html>
